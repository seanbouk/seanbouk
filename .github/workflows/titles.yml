name: Regenerate titles

# Runs the title-SVG generator whenever the source files change, and
# commits any drift back so the generated SVGs always match the config.
#
# Path filters keep this from looping on its own commits — it only
# re-triggers when projects.yaml, the script, the font, or this
# workflow itself changes.

on:
  push:
    paths:
      - 'titles/projects.yaml'
      - 'titles/generate.mjs'
      - 'titles/package.json'
      - 'titles/package-lock.json'
      - 'titles/fonts/**'
      - '.github/workflows/titles.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: titles/package-lock.json

      - name: Install
        working-directory: titles
        run: npm ci

      - name: Generate
        working-directory: titles
        run: npm run build

      - name: Commit any changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add titles/svg/
          if git diff --cached --quiet; then
            echo "No SVG changes."
            exit 0
          fi
          git commit -m "Regenerate title SVGs"
          git push
